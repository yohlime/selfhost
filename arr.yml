include:
  - music.yml
  - video.yml
  - games.yml

services:
  comet:
    container_name: comet
    image: g0ldyy/comet
    restart: unless-stopped
    networks:
      - yohnet
    environment:
      DATABASE_TYPE: postgresql
      DATABASE_FORCE_IPV4_RESOLUTION: False
      DATABASE_URL: ${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/comet?sslmode=disable
    env_file:
      - comet/.env
      - .env
    volumes:
      - ./comet/data:/data
    depends_on:
      - postgres
      - prowlarr
    labels:
      - traefik.enable=true
      - traefik.http.routers.comet.rule=Host(`comet.${DOMAIN}`)
      - traefik.http.routers.comet.entrypoints=websecure
      - traefik.http.routers.comet.tls.certresolver=letsencrypt
      - traefik.http.services.comet.loadbalancer.server.port=8000

  # jackett:
  #   image: linuxserver/jackett:latest
  #   container_name: jackett
  #   restart: unless-stopped
  #   networks:
  #     - yohnet
  #   env_file:
  #     - .env
  #   volumes:
  #     - ./jackett/data:/config
  #   depends_on:
  #     - flaresolverr
